name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: VonLanplace
          template: classic
          base: header, repositories
          plugin_languages: yes
          config_timezone: America/Sao_Paulo
          
          # ADICIONE/ALTERE ESTAS LINHAS ABAIXO:
          config_output: svg
          config_order: base.header, base.repositories, languages
          optimize_svg: no             # Desativa a otimização que trava
          committer_token: ${{ secrets.METRICS_TOKEN }} # Força o uso do seu token para o push
